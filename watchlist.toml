[backfill]
default_start_year = 2016
earliest_start_year = 2007

[thresholds]
watch = 16
skim = 10
transcript = 6
background = 3

[metadata_weights]
qcon_source = 6
relevant_track = 4
has_transcript = 3
has_video = 2
has_slides = 1
practical_duration = 1
company_fit = 3
recent_weekly = 2

[popularity]
enabled = true
like_step = 10
view_step = 1000
max_bonus = 4

[sources]
qcon_seed_urls = [
  "https://www.infoq.com/qcon-london-2016/",
  "https://www.infoq.com/qcon-newyork-2016/",
  "https://www.infoq.com/conferences/qconsf2016/",
]

[github]
repo = "abkolan/weekly-qcon-watchlist"
project_owner = "abkolan"
project_title = "QCon Watch Backlog"
project_number = 1
eligible_decisions = ["watch", "skim", "transcript"]
batch_limit = 25
sleep_seconds = 1
default_status = "Backlog"

[companies]
preferred = [
  "Netflix",
  "Google",
  "Microsoft",
  "Meta",
  "Uber",
  "Stripe",
  "Shopify",
  "Cloudflare",
  "LinkedIn",
  "Airbnb",
  "Datadog",
  "Temporal",
  "OpenAI",
  "Anthropic",
  "Coinbase",
]

[[signals]]
name = "qcon"
weight = 6
tags = ["qcon"]
terms = ["QCon", "QCon London", "QCon SF", "QCon Plus", "QCon New York", "QCon San Francisco"]

