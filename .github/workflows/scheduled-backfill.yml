name: Scheduled QCon Backfill

on:
  schedule:
    # GitHub cron is UTC. These two schedules alternate to run every 90 minutes.
    - cron: "0 0-21/3 * * *"
    - cron: "30 1-22/3 * * *"
  workflow_dispatch:
    inputs:
      start_year:
        description: Oldest year to include
        required: true
        default: "2016"
      end_year:
        description: Newest year to include
        required: true
        default: "2030"
      limit:
        description: Maximum Project repairs plus new issues per run
        required: true
        default: "10"
      dry_run:
        description: Preview the next batch without writing to GitHub
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write
  issues: write

concurrency:
  group: scheduled-qcon-backfill-main
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.QCON_WATCHLIST_TOKEN || github.token }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          token: ${{ secrets.QCON_WATCHLIST_TOKEN || github.token }}

      - uses: astral-sh/setup-uv@v8.2.0

      - name: Resolve run settings
        run: |
          echo "START_YEAR=${{ inputs.start_year || '2016' }}" >> "$GITHUB_ENV"
          echo "END_YEAR=${{ inputs.end_year || '2030' }}" >> "$GITHUB_ENV"
          echo "LIMIT=${{ inputs.limit || '10' }}" >> "$GITHUB_ENV"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "DRY_RUN=false" >> "$GITHUB_ENV"
          else
            echo "DRY_RUN=${{ inputs.dry_run || 'true' }}" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Start from latest main
        run: git pull --ff-only origin main

      - name: Validate before writes
        run: uv run --extra dev pytest -q

      - name: Preview next historical crawl source
        run: |
          uv run python scripts/migrate_historical_qcon.py \
            --start-year "$START_YEAR" \
            --end-year "$END_YEAR" \
            --max-sources 1 \
            --max-pages 1 \
            --dry-run

      - name: Migrate next historical crawl source
        if: env.DRY_RUN == 'false'
        run: |
          uv run python scripts/migrate_historical_qcon.py \
            --start-year "$START_YEAR" \
            --end-year "$END_YEAR" \
            --max-sources 1 \
            --max-pages 1 \
            --enrich-details

      - name: Preview next scheduled batch
        run: |
          uv run infoq-watchlist github-backfill \
            --start-year "$START_YEAR" \
            --end-year "$END_YEAR" \
            --limit "$LIMIT" \
            --add-to-project \
            --dry-run

      - name: Create next scheduled batch
        id: backfill
        if: env.DRY_RUN == 'false'
        run: |
          set +e
          uv run infoq-watchlist github-backfill \
            --start-year "$START_YEAR" \
            --end-year "$END_YEAR" \
            --limit "$LIMIT" \
            --create-issues \
            --add-to-project
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ] && [ "$status" -ne 2 ]; then
            exit "$status"
          fi

      - name: Maintain database size
        if: env.DRY_RUN == 'false'
        run: uv run infoq-watchlist db-maintenance --vacuum-threshold-mb 5 --fail-threshold-mb 25

      - name: Validate after writes
        if: env.DRY_RUN == 'false'
        run: uv run --extra dev pytest -q

      - name: Commit database state
        if: env.DRY_RUN == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/infoq.db
          git diff --cached --quiet || git commit -m "Update scheduled QCon backfill state"
          git push

      - name: Upload database snapshot
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: scheduled-qcon-backfill-state
          path: data/infoq.db

      - name: Report handled rate limit after checkpoint
        if: steps.backfill.outputs.status == '2'
        run: echo "::notice::GitHub rate limit reached after checkpointing database state; the next scheduled run will resume."
